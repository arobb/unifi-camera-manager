name: Camera PoE Controller
version: "1.0.0"
slug: camera_poe_controller
description: >-
  Controls interior camera power (via PoE) using an Adafruit IO dashboard toggle.
  Works with the HA UniFi Network integration — no separate UniFi credentials needed.
url: https://github.com/your-username/unifi-camera-manager
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

startup: application
boot: auto
init: false

homeassistant_api: true

ingress: true
ingress_port: 8099
panel_icon: mdi:cctv
panel_title: Camera PoE

options:
  adafruit_io_username: ""
  adafruit_io_key: ""
  adafruit_io_feed: "camera-poe"

schema:
  adafruit_io_username: str
  adafruit_io_key: password
  adafruit_io_feed: str
